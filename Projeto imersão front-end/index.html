<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devflix</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js" defer></script>
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
            <button class="theme-toggle" type="button" aria-label="Alternar tema"></button>
        </header>

        <section class="profiles" aria-label="Perfis de usuário">
            <ul>
                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/perfil-1.jpg" alt="Perfil 1">
                            <figcaption>Luiz</figcaption>
                        </figure>
                    </article>
                </li>

                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/perfil-3.jpg" alt="Perfil 3">
                            <figcaption>Julia</figcaption>
                        </figure>
                    </article>
                </li>

                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/perfil-4.jpg" alt="Perfil 4">
                            <figcaption>Binha</figcaption>
                        </figure>
                    </article>
                </li>

                <li>
                    <article class="profile">
                        <figure>
                            <img src="assets/perfil-2.jpg" alt="Perfil 2">
                            <figcaption>Pedro</figcaption>
                        </figure>
                    </article>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
